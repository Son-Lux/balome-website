<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Balomè – Mappa Progetti India</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,600;0,700;0,900;1,700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<style>
/* ══════════════════════════════════════
   VARIABILI da style.css di Balomè
══════════════════════════════════════ */
:root {
  --orange:      #F5921E;
  --orange-dark: #d97f10;
  --green:       #1A7A2E;
  --green-light: #4CAF6A;
  --dark:        #148708;
  --dark-mid:    #2A3FA0;
  --text:        #1a2040;
  --text-light:  #4A5580;
  --bg:          #FAFBFF;
  --bg-warm:     #FFF7EE;
  --bg-card:     #FFFFFF;
  --border:      #E0E8F0;
  --shadow:      0 4px 24px rgba(27,47,140,0.10);
  --shadow-lg:   0 12px 48px rgba(27,47,140,0.18);
  --radius:      18px;
  --radius-sm:   10px;
  --font:        'Poppins', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ── HEADER ── */
.hd { text-align: center; padding: 2rem 1.5rem .9rem; max-width: 700px; width: 100%; }
.section-label {
  display: inline-block;
  font-size: .78rem; font-weight: 700;
  letter-spacing: .12em; text-transform: uppercase;
  color: var(--orange);
  background: rgba(245,146,30,.1);
  padding: 6px 16px; border-radius: 50px;
  margin-bottom: 14px;
}
.hd h2 {
  font-family: var(--font);
  font-size: clamp(1.6rem, 4vw, 2.4rem);
  font-weight: 900;
  color: var(--dark);
  line-height: 1.15;
  margin-bottom: .4rem;
}
.hd p { font-size: .9rem; color: var(--text-light); line-height: 1.65; }

/* ── MAP ── */
.map-wrap { width: 100%; max-width: 740px; margin: 0 auto; padding: 0 .8rem 1rem; }
#map-svg  { width: 100%; height: auto; display: block; }

/* Countries */
.india    { fill: #FFF3E0; stroke: #E0A040; stroke-width: .9px; }
.neighbor { fill: #EAE4D6; stroke: #C8B888; stroke-width: .5px; }
.land-bg  { fill: #D8D0B8; stroke: #B8AA90; stroke-width: .35px; }
.sea-bg   { fill: #C8DFF0; }
.graticule{ fill: none; stroke: #A0C0D8; stroke-width: .3px; opacity: .5; }
.borders  { fill: none; stroke: #C0A860; stroke-width: .55px; }

/* ── PULSE RINGS ──
   Due anelli sfalsati per pin — animano il cerchio SVG r e opacity */
@keyframes ring-out {
  0%   { r: 7;  opacity: .8; stroke-width: 2.2; }
  100% { r: 28; opacity: 0;  stroke-width: .4; }
}
.pulse-ring { animation: ring-out 2.2s ease-out infinite; }

/* ── LEGEND ── */
.legend {
  max-width: 740px; width: 100%;
  padding: 0 .8rem 1.8rem;
  display: flex; flex-wrap: wrap; gap: .48rem; justify-content: center;
}
.leg-btn {
  display: flex; align-items: center; gap: .44rem;
  background: var(--bg-card);
  border: 1.5px solid var(--border);
  border-radius: 50px;
  padding: .3rem .82rem .3rem .52rem;
  cursor: pointer;
  font-size: .77rem; font-weight: 600;
  color: var(--text);
  font-family: var(--font);
  transition: all .2s;
  box-shadow: var(--shadow);
}
.leg-btn:hover {
  border-color: var(--orange);
  background: var(--bg-warm);
  transform: translateY(-2px);
  box-shadow: 0 4px 16px rgba(245,146,30,.2);
}
.leg-dot { width: 9px; height: 9px; background: var(--orange); border-radius: 50%; flex-shrink: 0; }

/* ── POPUP ── */
.overlay {
  display: none; position: fixed; inset: 0; z-index: 300;
  background: rgba(26,32,64,.52);
  align-items: center; justify-content: center;
  padding: 1rem;
}
.overlay.open { display: flex; animation: fB .22s ease; }
@keyframes fB { from { opacity:0 } to { opacity:1 } }

.card {
  background: var(--bg-card);
  border-radius: var(--radius);
  max-width: 450px; width: 100%;
  overflow: hidden;
  box-shadow: var(--shadow-lg);
  animation: sU .28s cubic-bezier(.34,1.56,.64,1);
  max-height: 92vh; overflow-y: auto;
  border: 1px solid var(--border);
}
@keyframes sU { from { transform:translateY(24px); opacity:0 } to { transform:translateY(0); opacity:1 } }

/* Header card = gradiente verde–arancione del sito (progetto India) */
.card-top {
  background: linear-gradient(90deg, #FF9933 0%, #138808 50%, #FF9933 100%);
  background-size: 200% 100%;
  animation: indiaFlag 6s linear infinite;
  padding: 1.4rem 1.5rem 1rem; position: relative;
}
@keyframes indiaFlag {
  0%   { background-position: 0% 0%; }
  50%  { background-position: 100% 0%; }
  100% { background-position: 0% 0%; }
}
.c-close {
  position: absolute; top: .88rem; right: .88rem;
  background: rgba(255,255,255,.22); border: none;
  border-radius: 50%; width: 30px; height: 30px;
  font-size: .88rem; color: #fff; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s;
}
.c-close:hover { background: rgba(255,255,255,.4); }
.c-flag  { font-size: 1.8rem; margin-bottom: .38rem; }
.c-city  { font-size: .67rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: rgba(255,255,255,.82); margin-bottom: .15rem; }
.c-title { font-family: var(--font); font-size: 1.2rem; font-weight: 900; color: #fff; line-height: 1.2; text-shadow: 0 1px 4px rgba(0,0,0,.2); }

.card-body { padding: 1.3rem 1.5rem 1.55rem; }

.c-tags { display: flex; flex-wrap: wrap; gap: .33rem; margin-bottom: .9rem; }
.c-tag  {
  background: rgba(245,146,30,.1);
  color: var(--orange-dark);
  font-size: .63rem; font-weight: 700;
  padding: .18rem .54rem; border-radius: 50px;
  letter-spacing: .02em;
}

.c-text { font-size: .87rem; line-height: 1.75; color: var(--text-light); margin-bottom: 1rem; }

.c-stats { display: flex; gap: .65rem; flex-wrap: wrap; margin-bottom: 1.1rem; }
.c-stat  {
  background: var(--bg-warm);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: .5rem .75rem; flex: 1; min-width: 72px; text-align: center;
}
.s-num { font-family: var(--font); font-size: 1.3rem; font-weight: 900; color: var(--orange); display: block; }
.s-lbl { font-size: .63rem; color: var(--text-light); font-weight: 600; letter-spacing: .03em; text-transform: uppercase; }

.c-link {
  display: inline-flex; align-items: center; gap: .4rem;
  background: var(--orange); color: #fff;
  font-size: .85rem; font-weight: 700;
  padding: .65rem 1.3rem; border-radius: 50px;
  text-decoration: none;
  box-shadow: 0 4px 16px rgba(245,146,30,.35);
  transition: background .18s, transform .12s, box-shadow .18s;
}
.c-link:hover {
  background: var(--orange-dark);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(245,146,30,.4);
}

@media (max-width: 480px) {
  .c-title { font-size: 1.05rem; }
  .card-body { padding: 1rem 1.15rem 1.3rem; }
  .card-top  { padding: 1.1rem 1.15rem .85rem; }
}
</style>
</head>
<body>

<div class="hd">
  <div class="section-label">🇮🇳 Progetti in India</div>
  <h2>Dove operiamo</h2>
  <p>Clicca sui pin per scoprire i progetti Balomè sul territorio indiano.</p>
</div>

<div class="map-wrap">
  <svg id="map-svg" aria-label="Mappa dell'Asia meridionale con i progetti Balomè"></svg>
</div>

<div class="legend">
  <button class="leg-btn" onclick="op('deepashram')">  <div class="leg-dot"></div>🏠 Deepashram – Gurgaon</button>
  <button class="leg-btn" onclick="op('calcutta')">    <div class="leg-dot"></div>🌸 Calcutta</button>
  <button class="leg-btn" onclick="op('karunanjali')"> <div class="leg-dot"></div>📚 Karunanjali – Maharashtra</button>
  <button class="leg-btn" onclick="op('anandasharam')"><div class="leg-dot"></div>🌱 Anandasharam</button>
</div>

<!-- POPUP -->
<div class="overlay" id="ov" role="dialog" aria-modal="true" aria-labelledby="cTitle">
  <div class="card">
    <div class="card-top">
      <button class="c-close" onclick="cl()" aria-label="Chiudi">✕</button>
      <div class="c-flag"  id="cFlag"></div>
      <div class="c-city"  id="cCity"></div>
      <div class="c-title" id="cTitle"></div>
    </div>
    <div class="card-body">
      <div class="c-tags"  id="cTags"></div>
      <div class="c-text"  id="cText"></div>
      <div class="c-stats" id="cStats"></div>
      <a class="c-link" id="cLink" href="#progetti">Scopri il progetto →</a>
    </div>
  </div>
</div>

<script>
/* ════════════════════════════════
   DATI PROGETTI
════════════════════════════════ */
const DATA = {
  deepashram: {
    lat:28.47, lng:77.03, emoji:'🏠',
    city:'Gurgaon – Delhi NCR', title:'Progetto Deepashram',
    tags:['Ragazzi orfani','Disabilità','Fisioterapia','Istruzione','Missionari della Carità'],
    text:'A Rajiv Nagar Gurgaon, a pochi km da Delhi, in una casa fondata da Madre Teresa oggi gestita dai Missionari della Carità, vivono 39 ragazzi orfani e abbandonati con diverse patologie: cecità, mutismo, sordità, spasticità e disabilità mentale. Grazie al sostegno di Balomè garantiamo fisioterapia e istruzione.',
    stats:[{n:'39',l:'Ragazzi accolti'},{n:'2',l:'Servizi garantiti'}], link:'#progetti'
  },
  calcutta: {
    lat:22.57, lng:88.36, emoji:'🌸',
    city:'Calcutta, Bengala Occidentale', title:'Progetto Calcutta',
    tags:['Orfanotrofio','Shishu Bhavan','Missionarie della Carità','Bambini vulnerabili'],
    text:'A Shishu Bhavan, orfanotrofio delle Missionarie della Carità di Madre Teresa a Calcutta, ha preso forma la storia di Balomè. Da quel luogo meraviglioso, dove abbiamo incontrato nostra figlia, nasce la promessa: non dimenticare mai i bambini lasciati soli.',
    stats:[{n:'🙏',l:'Origine di Balomè'},{n:'∞',l:'Bambini nel cuore'}], link:'#progetti'
  },
  karunanjali: {
    lat:18.62, lng:73.85, emoji:'📚',
    city:'Talagaon Dabhade, Maharashtra', title:'Karunanjali School',
    tags:['Scuola residenziale','Disabilità mentale','Suore di Sant\'Anna','Zone rurali'],
    text:'Le Suore di Sant\'Anna girano per i villaggi rurali del Maharashtra e trovano bambini con problemi mentali tenuti a casa senza istruzione. Grazie a Balomè, oggi 33 bambini sono accolti in forma residenziale e altri 13 frequentano il centro diurno.',
    stats:[{n:'33',l:'Residenziali'},{n:'13',l:'Centro diurno'}], link:'#progetti'
  },
  anandasharam: {
    lat:10.85, lng:76.27, emoji:'🌱',
    city:'India meridionale (Kerala)', title:'Progetto Anandasharam',
    tags:['Scuole rurali','Salute','Nutrizione','Formazione insegnanti'],
    text:'In contesti di estrema povertà dove cure mediche e istruzione sono ancora un privilegio, i volontari Balomè garantiscono un futuro ai bambini più vulnerabili: scuole rurali, programmi nutrizionali e sanitari, formazione per insegnanti locali.',
    stats:[{n:'4',l:'Aree di intervento'},{n:'♥',l:'Bambini sostenuti'}], link:'#progetti'
  }
};

/* ════════════════════════════════
   MAPPA D3
════════════════════════════════ */
const W = 740, H = 800;

const svg = d3.select('#map-svg')
  .attr('viewBox', `0 0 ${W} ${H}`)
  .attr('preserveAspectRatio', 'xMidYMid meet');

const defs = svg.append('defs');

/* ── Gradiente radiale arancione per la testa del pin (da --orange) ── */
const rg = defs.append('radialGradient')
  .attr('id','pin-grad')
  .attr('cx','35%').attr('cy','30%').attr('r','68%');
rg.append('stop').attr('offset','0%')  .attr('stop-color','#FFBE60');  /* highlight */
rg.append('stop').attr('offset','55%') .attr('stop-color','#F5921E');  /* --orange  */
rg.append('stop').attr('offset','100%').attr('stop-color','#C06808');  /* scuro     */

/* Hover: più saturo */
const rgh = defs.append('radialGradient')
  .attr('id','pin-grad-h')
  .attr('cx','35%').attr('cy','30%').attr('r','68%');
rgh.append('stop').attr('offset','0%')  .attr('stop-color','#FFD080');
rgh.append('stop').attr('offset','55%') .attr('stop-color','#FF9F30');
rgh.append('stop').attr('offset','100%').attr('stop-color','#A85208');

/* Drop shadow */
const flt = defs.append('filter')
  .attr('id','pin-shadow')
  .attr('x','-50%').attr('y','-50%')
  .attr('width','200%').attr('height','200%');
flt.append('feDropShadow')
  .attr('dx',0).attr('dy',4).attr('stdDeviation',3.5)
  .attr('flood-color','rgba(20,32,64,0.32)');

const projection = d3.geoMercator()
  .center([82, 21])
  .scale(1080)
  .translate([W/2, H/2]);

const path = d3.geoPath().projection(projection);

/* Mare */
svg.append('rect').attr('width',W).attr('height',H).attr('class','sea-bg');

/* Graticule 10° */
const grat = d3.geoGraticule().step([10,10]);
svg.append('path').datum(grat()).attr('class','graticule').attr('d', path);

const TOPO = 'https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json';
const INDIA = 356;
const NBRS  = {
  586:'Pakistan', 50:'Bangladesh', 524:'Nepal',
  64:'Bhutan', 144:'Sri Lanka', 104:'Myanmar',
  156:'Cina', 4:'Afghanistan'
};

fetch(TOPO).then(r => r.json()).then(world => {
  const countries = topojson.feature(world, world.objects.countries);

  /* Sfondo terra */
  svg.append('g').selectAll('path')
    .data(countries.features.filter(d => +d.id !== INDIA && !NBRS[+d.id]))
    .join('path').attr('class','land-bg').attr('d', path);

  /* Paesi vicini */
  const nbFeats = countries.features.filter(d => NBRS[+d.id]);
  svg.append('g').selectAll('path')
    .data(nbFeats).join('path').attr('class','neighbor').attr('d', path);

  /* Etichette vicini */
  svg.append('g').selectAll('text')
    .data(nbFeats).join('text')
    .attr('transform', d => `translate(${path.centroid(d)})`)
    .attr('text-anchor','middle')
    .attr('dominant-baseline','central')
    .attr('fill','#7A6840')
    .attr('font-family','Poppins, sans-serif')
    .attr('font-size', 9).attr('font-weight', 600)
    .text(d => NBRS[+d.id]);

  /* India */
  svg.append('g').selectAll('path')
    .data(countries.features.filter(d => +d.id === INDIA))
    .join('path').attr('class','india').attr('d', path);

  /* Confini */
  svg.append('path')
    .datum(topojson.mesh(world, world.objects.countries, (a,b) => a !== b))
    .attr('class','borders').attr('d', path);

  /* Label India */
  const indFeat = countries.features.find(d => +d.id === INDIA);
  if (indFeat) {
    const [cx, cy] = path.centroid(indFeat);
    svg.append('text')
      .attr('x', cx).attr('y', cy - 14)
      .attr('text-anchor','middle')
      .attr('fill','#148708').attr('fill-opacity',.65)
      .attr('font-family','Poppins, sans-serif')
      .attr('font-size',15).attr('font-weight',900)
      .text('India');
  }

  /* Etichette oceani */
  [
    {t:'Mar Arabico',       lon:63, lat:18},
    {t:'Golfo del Bengala', lon:90, lat:12},
    {t:'Oceano Indiano',    lon:78, lat: 3},
  ].forEach(({t,lon,lat}) => {
    const [x,y] = projection([lon,lat]);
    if(x>10&&x<W-10&&y>10&&y<H-10)
      svg.append('text')
        .attr('x',x).attr('y',y)
        .attr('text-anchor','middle')
        .attr('fill','#2A60A0').attr('font-style','italic')
        .attr('font-family','Poppins, sans-serif')
        .attr('font-size',10).attr('opacity',.72)
        .text(t);
  });

  /* ═══════════════════════════════
     PINS
     - Punta del pin = (0, 0) nel sistema locale
     - Testa centrata a (0, –22)
     - Hover via d3 transition su attr('transform') del gruppo .pin-inner
       → scala intorno a (0,0) = punta → nessun drift
     - Entry: drop-in con easeBounceOut, delay ampio e sfalsato per pin
  ═══════════════════════════════ */
  Object.entries(DATA).forEach(([id, d], i) => {
    const [px, py] = projection([d.lng, d.lat]);

    /* Gruppo esterno: solo traslazione geografica */
    const outer = svg.append('g')
      .attr('id', 'pin-' + id)
      .attr('class', 'pin-wrap')
      .attr('transform', `translate(${px},${py})`)
      .attr('role','button').attr('tabindex','0')
      .attr('aria-label', d.title)
      .style('cursor','pointer')
      .on('click', () => op(id))
      .on('keydown', function(e){
        if(e.key==='Enter'||e.key===' '){ e.preventDefault(); op(id); }
      });

    /* ── Doppio anello pulsante (sfalsato tra i due e tra i pin) ── */
    [0, 1.1].forEach((ringDelay, ri) => {
      outer.append('circle')
        .attr('class', 'pulse-ring')
        .attr('cx', 0).attr('cy', -22)
        .attr('r', 7)
        .attr('fill', 'none')
        .attr('stroke', '#F5921E')           /* --orange */
        .attr('stroke-width', 2.2)
        .attr('opacity', .78)
        .style('animation-delay', `${ringDelay + i * 0.38}s`);
    });

    /* ── Gruppo interno: scala intorno alla punta (0,0) ── */
    const inner = outer.append('g')
      .attr('class', 'pin-inner')
      .attr('transform', 'scale(1)');

    /* Entry drop-in:
       delay ampio = 600ms base + 280ms per ogni pin successivo */
    inner
      .style('opacity', 0)
      .attr('transform', 'scale(1) translateY(-50)')   /* partenza alta */
      .transition()
        .delay(600 + i * 280)
        .duration(820)
        .ease(d3.easeBounceOut)
        .style('opacity', 1)
        .attr('transform', 'scale(1) translateY(0)');

    /* Ombra a terra */
    inner.append('ellipse')
      .attr('cx',0).attr('cy',2)
      .attr('rx',8).attr('ry',3.5)
      .attr('fill','rgba(26,32,64,.2)');

    /* Gambo (punta in basso a 0,0) */
    inner.append('polygon')
      .attr('points','0,0 -7,-16 7,-16')
      .attr('fill','#B86010');

    /* Testa: cerchio con gradiente --orange */
    inner.append('circle')
      .attr('cx',0).attr('cy',-22)
      .attr('r',15)
      .attr('fill','url(#pin-grad)')
      .attr('stroke','#fff')
      .attr('stroke-width',2.8)
      .attr('filter','url(#pin-shadow)');

    /* Highlight lucido */
    inner.append('circle')
      .attr('cx',-4.5).attr('cy',-28)
      .attr('r',4)
      .attr('fill','rgba(255,255,255,.32)');

    /* Emoji al centro della testa */
    inner.append('text')
      .attr('x',0).attr('y',-22)
      .attr('text-anchor','middle')
      .attr('dominant-baseline','central')
      .attr('font-size',14)
      .attr('pointer-events','none')
      .text(d.emoji);

    /* Etichetta città in pill scuro */
    const lblTxt  = d.city.split(',')[0].split('–')[0].trim();
    const lblW    = Math.max(60, lblTxt.length * 6.4 + 18);
    const lblG    = inner.append('g').attr('transform','translate(0,9)');
    lblG.append('rect')
      .attr('x',-lblW/2).attr('y',0)
      .attr('width',lblW).attr('height',16)
      .attr('rx',5)
      .attr('fill','rgba(26,32,64,.84)');
    lblG.append('text')
      .attr('x',0).attr('y',8)
      .attr('text-anchor','middle')
      .attr('dominant-baseline','central')
      .attr('fill','#fff')
      .attr('font-family','Poppins, sans-serif')
      .attr('font-size',8.5).attr('font-weight',700)
      .attr('pointer-events','none')
      .text(lblTxt);

    /* ── HOVER: scala intorno alla punta con d3 transition ──
       Usiamo attr('transform') sul gruppo inner, NON style.
       L'origine è (0,0) = punta del pin → nessun drift spaziale. */
    outer
      .on('mouseenter', function(){
        if(activePin === id) return;
        d3.select(this).select('.pin-inner')
          .interrupt()
          .transition().duration(160).ease(d3.easeCubicOut)
          .attr('transform','scale(1.32)');
        d3.select(this).select('circle[r="15"]')
          .attr('fill','url(#pin-grad-h)');
      })
      .on('mouseleave', function(){
        if(activePin === id) return;
        d3.select(this).select('.pin-inner')
          .interrupt()
          .transition().duration(360).ease(d3.easeBounceOut)
          .attr('transform','scale(1)');
        d3.select(this).select('circle[r="15"]')
          .attr('fill','url(#pin-grad)');
      });
  });

  /* Compass rose — colori sito */
  const cr = svg.append('g').attr('transform',`translate(${W-54},54)`);
  cr.append('circle').attr('r',22)
    .attr('fill','rgba(255,247,238,.92)').attr('stroke','#E0A040').attr('stroke-width',.9);
  cr.append('polygon').attr('points','0,-17 5,0 0,-6 -5,0').attr('fill','#F5921E');
  cr.append('polygon').attr('points','0,17 5,0 0,6 -5,0').attr('fill','#CBBF90');
  cr.append('polygon').attr('points','-17,0 0,5 -6,0 0,-5').attr('fill','#CBBF90').attr('opacity',.7);
  cr.append('polygon').attr('points','17,0 0,5 6,0 0,-5').attr('fill','#CBBF90').attr('opacity',.7);
  cr.append('text').attr('y',-24)
    .attr('text-anchor','middle').attr('dominant-baseline','central')
    .attr('font-family','Poppins, sans-serif').attr('font-size',10).attr('font-weight',900)
    .attr('fill','#148708').text('N');

  /* Barra scala */
  const [x0] = projection([68,7]);
  const [x1] = projection([77,7]);
  const sbLen = x1 - x0, sbY = H - 22;
  svg.append('rect').attr('x',x0).attr('y',sbY-4).attr('width',sbLen/2).attr('height',4).attr('fill','#148708');
  svg.append('rect').attr('x',x0+sbLen/2).attr('y',sbY-4).attr('width',sbLen/2).attr('height',4)
    .attr('fill','#fff').attr('stroke','#148708').attr('stroke-width',.5);
  [['0',x0],['~1000 km',x0+sbLen]].forEach(([t,x]) =>
    svg.append('text').attr('x',x).attr('y',sbY+8)
      .attr('text-anchor','middle')
      .attr('font-family','Poppins, sans-serif').attr('font-size',8).attr('fill','#148708').text(t)
  );

}).catch(() => {
  svg.append('text').attr('x',W/2).attr('y',H/2)
    .attr('text-anchor','middle')
    .attr('font-family','Poppins, sans-serif').attr('font-size',14).attr('fill','#4A5580')
    .text('Caricamento mappa…');
});

/* ════════════════════════════════
   POPUP + STATE
════════════════════════════════ */
let activePin = null;

function op(id) {
  const d = DATA[id]; if(!d) return;
  document.getElementById('cFlag').textContent  = d.emoji;
  document.getElementById('cCity').textContent  = d.city;
  document.getElementById('cTitle').textContent = d.title;
  document.getElementById('cText').textContent  = d.text;
  document.getElementById('cLink').href         = d.link;
  document.getElementById('cTags').innerHTML    =
    d.tags.map(t=>`<span class="c-tag">${t}</span>`).join('');
  document.getElementById('cStats').innerHTML   =
    d.stats.map(s=>`<div class="c-stat"><span class="s-num">${s.n}</span><span class="s-lbl">${s.l}</span></div>`).join('');

  if(activePin) resetPin(activePin);
  activePin = id;

  /* Tieni il pin attivo scalato e con gradiente hover */
  d3.select('#pin-'+id).select('.pin-inner')
    .interrupt()
    .transition().duration(160)
    .attr('transform','scale(1.38)');
  d3.select('#pin-'+id).select('circle[r="15"]')
    .attr('fill','url(#pin-grad-h)');

  document.getElementById('ov').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function resetPin(id) {
  d3.select('#pin-'+id).select('.pin-inner')
    .interrupt()
    .transition().duration(420).ease(d3.easeBounceOut)
    .attr('transform','scale(1)');
  d3.select('#pin-'+id).select('circle[r="15"]')
    .attr('fill','url(#pin-grad)');
}

function cl() {
  document.getElementById('ov').classList.remove('open');
  document.body.style.overflow = '';
  if(activePin){ resetPin(activePin); activePin = null; }
}

document.getElementById('ov').addEventListener('click', function(e){ if(e.target===this) cl(); });
document.addEventListener('keydown', e => { if(e.key==='Escape') cl(); });
</script>
